<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Territoires — ta carte de conquête</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  :root {
    --ink: #10201c;
    --panel: rgba(250, 252, 250, 0.94);
    --brand: #0f6e56;
    --muted: #5c6b66;
    --line: rgba(16, 32, 28, 0.12);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body, #map { height: 100%; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); overflow: hidden; }
  #panel {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    left: 16px;
    width: min(330px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    background: var(--panel);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    z-index: 10;
  }
  .head { display: flex; align-items: center; gap: 10px; }
  #countries-btn {
    margin-left: auto; width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--line); background: #fff; font-size: 17px;
    cursor: pointer; display: none; flex: none;
  }
  #countries-modal {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(16,32,28,.45); backdrop-filter: blur(2px);
  }
  #countries-card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: min(420px, calc(100vw - 32px)); max-height: 80vh; overflow-y: auto;
    background: var(--panel); border-radius: 14px; padding: 18px;
    border: 1px solid var(--line);
  }
  #countries-card h2 { font-size: 15px; }
  #countries-card .close { float: right; border: 0; background: none; font-size: 18px; cursor: pointer; color: var(--muted); }
  .country-row { padding: 9px 0; border-top: 1px solid var(--line); font-size: 13.5px; cursor: pointer; }
  .country-row:hover .who { color: var(--brand); }
  .country-line .go { color: var(--brand); font-size: 11.5px; flex: none; }
  .country-row:first-of-type { border-top: 0; margin-top: 8px; }
  .country-line { display: flex; gap: 8px; align-items: baseline; }
  .country-line .who { flex: 1; }
  .country-line .val { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .country-bar { height: 5px; background: rgba(16,32,28,.08); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .country-bar div { height: 100%; background: var(--brand); border-radius: 3px; }
  #main-zone {
    margin-top: 12px; padding: 10px 12px; background: rgba(15,110,86,.08);
    border-radius: 10px; font-size: 13px; display: flex; gap: 8px; align-items: center;
  }
  #main-zone button {
    margin-left: auto; border: 0; background: var(--brand); color: #fff;
    padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; flex: none;
  }
  .head img { width: 36px; height: 36px; border-radius: 50%; background: #dde5e0; }
  .head b { font-size: 15px; display: block; }
  .head span { font-size: 12.5px; color: var(--muted); }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip {
    font-size: 12px; padding: 5px 12px; border-radius: 99px;
    border: 1px solid var(--line); background: #fff; color: var(--muted); cursor: pointer;
  }
  .chip.on { color: #fff; }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  .stat { flex: 1; background: rgba(15,110,86,.08); border-radius: 10px; padding: 8px 10px; }
  .stat b { display: block; font-size: 19px; font-variant-numeric: tabular-nums; color: #085041; }
  .stat i { font-style: normal; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  button.cta {
    width: 100%; margin-top: 12px; padding: 12px; font-size: 15px; font-weight: 600;
    color: #fff; background: #fc4c02; border: 0; border-radius: 10px; cursor: pointer;
  }
  #level { margin-top: 12px; display: none; }
  #level .lvl-top { display: flex; align-items: center; justify-content: space-between; }
  #level .lvl-top b {
    font-size: 12.5px; color: #fff; background: var(--brand);
    padding: 3px 10px; border-radius: 99px; letter-spacing: .02em;
  }
  #level .lvl-top span { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  #level .bar { height: 6px; background: rgba(16,32,28,.1); border-radius: 3px; overflow: hidden; margin-top: 5px; }
  #level .fill { height: 100%; width: 0%; background: var(--brand); transition: width .6s ease; }
  #level p { font-size: 12px; color: var(--muted); margin-top: 5px; }
  #progress { margin-top: 10px; display: none; }
  #progress .bar { height: 6px; background: rgba(16,32,28,.1); border-radius: 3px; overflow: hidden; }
  #progress .fill { height: 100%; width: 0%; background: var(--brand); transition: width .6s ease; }
  #progress p { font-size: 12px; color: var(--muted); margin-top: 5px; }
  #clan { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; display: none; }
  #clan h2 { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  #clan .code { margin-left: auto; font-size: 11.5px; color: var(--muted); }
  .tabs { display: flex; gap: 6px; margin-top: 10px; }
  .tabs button {
    flex: 1; padding: 7px; font-size: 12.5px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff; color: var(--muted); cursor: pointer;
  }
  .tabs button.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .member { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid var(--line); font-size: 13px; }
  .member:first-of-type { border-top: 0; }
  .member .rank { color: var(--muted); font-size: 12px; width: 14px; }
  .member .who { flex: 1; }
  .member .val { color: var(--muted); font-variant-numeric: tabular-nums; }
  #clan-forms { display: none; margin-top: 10px; }
  #clan-forms input {
    width: 100%; padding: 9px 10px; font-size: 13.5px;
    border: 1px solid var(--line); border-radius: 8px; margin-top: 6px;
  }
  #clan-forms .mini { display: flex; gap: 6px; }
  #clan-forms button {
    padding: 9px 12px; font-size: 12.5px; border-radius: 8px; border: 0;
    background: var(--brand); color: #fff; cursor: pointer; margin-top: 6px;
  }
  #ranking { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; display: none; }
  #ranking h2 { font-size: 13.5px; font-weight: 600; }
  .lb-row { padding: 7px 0 9px; border-top: 1px solid var(--line); font-size: 13px; }
  .lb-row:first-of-type { border-top: 0; }
  .lb-line { display: flex; gap: 8px; align-items: baseline; }
  .lb-line .rank { color: var(--muted); font-size: 12px; width: 18px; }
  .lb-line .who { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-line .val { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
  .lb-bar { height: 4px; background: rgba(16,32,28,.08); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .lb-bar div { height: 100%; background: var(--brand); border-radius: 2px; }
  .lb-row.me .who, .lb-row.me .val { font-weight: 600; color: #085041; }
  .lb-sep { text-align: center; color: var(--muted); font-size: 12px; padding: 2px 0; }
  button.share {
    width: 100%; margin-top: 12px; padding: 11px; font-size: 14px; font-weight: 600;
    color: #fff; background: var(--brand); border: 0; border-radius: 10px; cursor: pointer; display: none;
  }
  .maplibregl-popup-content { font: 13px ui-sans-serif, system-ui; border-radius: 10px; padding: 10px 12px; }
  .pop-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
  #logout { all: unset; display: block; margin-top: 10px; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <div class="head">
    <img id="avatar" alt="">
    <div><b id="name">Territoires</b><span id="subtitle">Chaque sortie capture des cases.</span></div>
    <button id="countries-btn" title="Mes pays">🌍</button>
  </div>

  <div id="chips"></div>

  <div class="tabs" id="period-tabs" style="display:none">
    <button id="period-all" class="on">Tout</button>
    <button id="period-year">Cette année</button>
  </div>

  <div class="row">
    <div class="stat"><b id="s-tiles">–</b><i>cases</i></div>
    <div class="stat"><b id="s-km">–</b><i>km</i></div>
    <div class="stat"><b id="s-acts">–</b><i>sorties</i></div>
  </div>

  <div id="level">
    <div class="lvl-top"><b id="lvl-name">–</b><span id="lvl-count">–</span></div>
    <div class="bar"><div class="fill" id="lvl-fill"></div></div>
    <p id="equiv"></p>
  </div>

  <div id="ranking">
    <h2>Classement</h2>
    <div class="tabs">
      <button id="lb-players" class="on">Joueurs</button>
      <button id="lb-clans">Clans</button>
    </div>
    <div id="lb-rows"></div>
  </div>

  <button class="share" id="share">Partager ma carte</button>

  <div id="progress">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <p id="progress-label">Synchronisation…</p>
  </div>

  <button class="cta" id="connect">Se connecter avec Strava</button>

  <div id="clan">
    <h2 id="clan-title">Clan</h2>
    <div class="tabs">
      <button id="tab-km" class="on">Kilomètres</button>
      <button id="tab-tiles">Cases conquises</button>
    </div>
    <div id="board"></div>
    <div id="clan-forms">
      <input id="clan-name" placeholder="Nom du clan à créer">
      <button id="create-clan">Créer mon clan</button>
      <div class="mini">
        <input id="clan-code" placeholder="Code d'invitation">
        <button id="join-clan">Rejoindre</button>
      </div>
    </div>
  </div>

  <button id="logout" style="display:none">déconnexion</button>
</div>

<div id="countries-modal">
  <div id="countries-card">
    <button class="close" id="countries-close">✕</button>
    <h2>🌍 Mes pays</h2>
    <div id="main-zone" style="display:none">
      <span id="main-zone-label">Zone principale : …</span>
      <button id="main-zone-go">Y aller</button>
    </div>
    <div id="countries-rows"></div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// Couleurs par sport : palette fixe très contrastée, attribuée dans l'ordre de fréquence
const PALETTE = ["#1E9E4F", "#E23A3A", "#2E71F0", "#F5A623", "#8E3AE2", "#00A3A3", "#E24A9B", "#7A4E1D"];
const sportColors = {};
let hiddenSports = new Set();
let metric = "km";

const map = new maplibregl.Map({
  container: "map",
  center: [2.2, 47.0],
  zoom: 5.3,
  preserveDrawingBuffer: true, // nécessaire pour "Partager ma carte"
  style: {
    version: 8,
    sources: {
      osm: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors",
      },
    },
    layers: [{ id: "osm", type: "raster", source: "osm" }],
  },
});
map.addControl(new maplibregl.NavigationControl(), "bottom-right");
window._map = map; // debug/console

const $ = (id) => document.getElementById(id);
let firstFit = true;
let styleReady = false;

// L'UI (session, stats, données) ne doit pas dépendre du fond de carte :
// on ne branche ici que les couches, boot() est lancé indépendamment.
map.on("load", () => {
  map.addSource("tiles", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
  map.addLayer({
    id: "tiles-fill", type: "fill", source: "tiles",
    filter: ["!=", ["get", "hybrid"], true],
    paint: {
      "fill-color": ["get", "color"],
      "fill-opacity": 0.34,
    },
  });
  // Cases multi-sports : damier avec la couleur de chaque discipline
  map.addLayer({
    id: "tiles-fill-hybrid", type: "fill", source: "tiles",
    filter: ["==", ["get", "hybrid"], true],
    paint: {
      "fill-pattern": ["get", "pattern"],
      "fill-opacity": 0.55,
    },
  });
  map.addLayer({
    id: "tiles-line", type: "line", source: "tiles",
    paint: {
      "line-color": ["case", ["get", "hybrid"], "#10201c", ["get", "color"]],
      "line-width": ["case", ["get", "hybrid"], 1.4, 0.6],
      "line-opacity": ["case", ["get", "hybrid"], 0.75, 0.6],
    },
  });
  // Clic sur une case : détail des disciplines (lisibilité du damier)
  const showTilePopup = (e) => {
    const p = e.features[0].properties;
    let html;
    if (p.enclave) {
      html = '<b>Enclave</b><br><span style="color:#5c6b66">Encerclée par ton territoire, comptée conquise</span>';
    } else {
      const sports = typeof p.sports === "string" ? JSON.parse(p.sports) : p.sports;
      html = "<b>" + (sports.length > 1 ? "Case hybride" : "Case conquise") + "</b><br>" +
        sports.map((s) =>
          `<span class="pop-dot" style="background:${colorFor(s)}"></span>${s}`
        ).join("<br>");
    }
    new maplibregl.Popup({ closeButton: false, maxWidth: "220px" })
      .setLngLat(e.lngLat).setHTML(html).addTo(map);
  };
  map.on("click", "tiles-fill", showTilePopup);
  map.on("click", "tiles-fill-hybrid", showTilePopup);
  map.on("mouseenter", "tiles-fill", () => (map.getCanvas().style.cursor = "pointer"));
  map.on("mouseleave", "tiles-fill", () => (map.getCanvas().style.cursor = ""));

  styleReady = true;
  applyFilter();
});

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (res.status === 401) return null;
  if (!res.ok) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function colorFor(sport) {
  if (!sportColors[sport]) {
    sportColors[sport] = PALETTE[Object.keys(sportColors).length % PALETTE.length];
  }
  return sportColors[sport];
}

// Damier multi-couleurs pour les cases hybrides : une image par combinaison
// de sports, générée en canvas et enregistrée dans le style MapLibre.
const patternCache = new Set();
function ensurePattern(sports) {
  const id = "damier|" + sports.join("|");
  if (patternCache.has(id)) return id;
  const cols = sports.map(colorFor);
  // GRID multiple du nombre de couleurs pour que le motif se répète sans couture
  const CELL = 12, GRID = cols.length * 2;
  const size = CELL * GRID;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  for (let cy = 0; cy < GRID; cy++) {
    for (let cx = 0; cx < GRID; cx++) {
      ctx.fillStyle = cols[(cx + cy) % cols.length];
      ctx.fillRect(cx * CELL, cy * CELL, CELL, CELL);
    }
  }
  map.addImage(id, ctx.getImageData(0, 0, size, size), { pixelRatio: 2 });
  patternCache.add(id);
  return id;
}

async function refreshSports() {
  const sports = (await api("/api/sports")) || [];
  const box = $("chips");
  box.innerHTML = "";
  for (const s of sports) {
    const c = colorFor(s.sport_type);
    const el = document.createElement("button");
    el.className = "chip" + (hiddenSports.has(s.sport_type) ? "" : " on");
    el.textContent = s.sport_type;
    if (!hiddenSports.has(s.sport_type)) {
      el.style.background = c;
      el.style.borderColor = c;
    }
    el.onclick = () => {
      hiddenSports.has(s.sport_type) ? hiddenSports.delete(s.sport_type) : hiddenSports.add(s.sport_type);
      refreshSports();
      applyFilter();
    };
    box.appendChild(el);
  }
}

let tilesData = { type: "FeatureCollection", features: [] };
function applyFilter() {
  if (!styleReady) return; // rejoué par map.on("load")
  // Une case reste visible tant qu'au moins un de ses sports est affiché ;
  // avec plusieurs sports visibles, elle passe en damier multi-couleurs.
  // Les enclaves (encerclées, ex. lacs) sont toujours visibles, en neutre.
  const features = [];
  for (const f of tilesData.features) {
    if (f.properties.enclave) {
      f.properties.color = "#8fb8a8";
      f.properties.hybrid = false;
      f.properties.pattern = "";
      features.push(f);
      continue;
    }
    const sports = (f.properties.sports || [f.properties.sport])
      .filter((s) => !hiddenSports.has(s))
      .sort();
    if (!sports.length) continue;
    f.properties.color = colorFor(sports[0]);
    f.properties.hybrid = sports.length > 1;
    f.properties.pattern = sports.length > 1 ? ensurePattern(sports) : "";
    features.push(f);
  }
  map.getSource("tiles")?.setData({ type: "FeatureCollection", features });
}

let periodSince = null; // null = tout l'historique, sinon "YYYY-MM-DD"

async function refreshMap() {
  const tiles = await api("/api/tiles" + (periodSince ? `?since=${periodSince}` : ""));
  if (!tiles) return;
  tilesData = tiles;
  applyFilter();
  if (firstFit && tiles.features.length) {
    firstFit = false;
    const b = denseBounds(tiles.features);
    const doFit = () =>
      map.fitBounds(b, {
        padding: { top: 70, right: 70, bottom: 70, left: innerWidth > 700 ? 400 : 70 },
        maxZoom: 12,
        animate: false, // cadrage initial : instantané et fiable partout
      });
    // cadrage immédiat, puis recadrage au load si le fond arrive après
    doFit();
    if (!styleReady) map.once("load", doFit);
  }
}

// Zone la plus dense (et ses abords) : cellule ~70 km la plus fournie.
// Utilisée pour le zoom initial et le bouton "Y aller" du menu pays —
// un séjour lointain ne doit pas dézoomer la carte au point de ne rien voir.
function denseBounds(features) {
  const CELL = 0.7;
  const buckets = new Map();
  const cellOf = (f) => {
    const [lng, lat] = f.geometry.coordinates[0][0];
    return [Math.floor(lng / CELL), Math.floor(lat / CELL)];
  };
  for (const f of features) {
    const k = cellOf(f).join(":");
    buckets.set(k, (buckets.get(k) || 0) + 1);
  }
  let bx = 0, by = 0, bestN = 0;
  for (const [k, n] of buckets) {
    if (n > bestN) { bestN = n; [bx, by] = k.split(":").map(Number); }
  }
  const b = new maplibregl.LngLatBounds();
  for (const f of features) {
    const [kx, ky] = cellOf(f);
    if (Math.abs(kx - bx) <= 1 && Math.abs(ky - by) <= 1)
      f.geometry.coordinates[0].forEach((c) => b.extend(c));
  }
  return b;
}

// Rangs façon ligues classées : le "pourcentage" devient une progression
// vers le prochain rang, jamais un 0,0001 % démotivant.
const TIERS = [
  [0, "Fer", "#7d8590"], [10, "Bronze", "#b0793f"], [30, "Argent", "#8fa3b4"],
  [75, "Or", "#d4a017"], [150, "Platine", "#2fb5a8"], [300, "Émeraude", "#1e9e4f"],
  [600, "Diamant", "#4f9cf0"], [1200, "Maître", "#8e3ae2"], [2500, "Grand Maître", "#d61f69"],
  [5000, "Conquérant", "#e23a3a"], [10000, "Empereur", "#f5a623"], [20000, "Légende", "#10201c"],
];

// Équivalence de surface parlante, à l'échelle qui a du sens
const AREA_UNITS = [
  ["Paris", 105], ["la Corse", 8722], ["la Belgique", 30688], ["la France", 543940],
];
function equivalence(km2) {
  if (km2 < 1) return "";
  let unit = AREA_UNITS[0];
  for (const u of AREA_UNITS) if (km2 / u[1] >= 0.9) unit = u;
  const r = km2 / unit[1];
  if (r < 0.9) return `≈ ${Math.round(r * 100)} % de ${unit[0]}`;
  const n = r >= 10 ? Math.round(r) : Math.round(r * 10) / 10;
  return `≈ ${n.toLocaleString("fr-FR")} × ${unit[0]}`;
}

let lastStats = null; // pour l'image de partage

async function refreshStats() {
  const s = await api("/api/stats" + (periodSince ? `?since=${periodSince}` : ""));
  if (!s) return;
  $("s-tiles").textContent = s.tiles.toLocaleString("fr-FR");
  $("s-acts").textContent = s.activities.toLocaleString("fr-FR");
  $("s-km").textContent = Math.round(s.distance_m / 1000).toLocaleString("fr-FR");

  if (s.period) {
    // Vue période : les compteurs suivent, la ligne km² aussi ;
    // le rang reste celui de la carrière (calculé en vue "Tout").
    const km2p = Math.round(s.area_km2 || 0);
    const eqp = equivalence(km2p);
    $("equiv").textContent = km2p >= 1
      ? `${km2p.toLocaleString("fr-FR")} km² conquis en ${s.period.slice(0, 4)}${eqp ? " · " + eqp : ""}`
      : "";
    return;
  }
  lastStats = s;

  let lvl = 0;
  while (lvl + 1 < TIERS.length && s.tiles >= TIERS[lvl + 1][0]) lvl++;
  const cur = TIERS[lvl];
  const next = TIERS[lvl + 1];
  s.tier = cur;
  $("lvl-name").textContent = cur[1];
  $("lvl-name").style.background = cur[2];
  const streak = s.streak > 1 ? ` · 🔥 ${s.streak} sem.` : "";
  if (next) {
    $("lvl-count").textContent =
      `${s.tiles.toLocaleString("fr-FR")} / ${next[0].toLocaleString("fr-FR")} cases${streak}`;
    $("lvl-fill").style.width =
      `${Math.round((100 * (s.tiles - cur[0])) / (next[0] - cur[0]))}%`;
    $("lvl-fill").style.background = cur[2];
  } else {
    $("lvl-count").textContent = `${s.tiles.toLocaleString("fr-FR")} cases${streak}`;
    $("lvl-fill").style.width = "100%";
  }
  const km2 = Math.round(s.area_km2 || 0);
  const eq = equivalence(km2);
  $("equiv").textContent = km2 >= 1
    ? `${km2.toLocaleString("fr-FR")} km² conquis${eq ? " · " + eq : ""}`
    : "";
  $("level").style.display = "block";
}

// --- Classement global : joueurs et clans, en % du leader ---
let lbMode = "players";

function lbRow(rank, who, tiles, leaderTiles, isMe) {
  const pct = leaderTiles ? Math.round((100 * tiles) / leaderTiles) : 0;
  return `<div class="lb-row${isMe ? " me" : ""}">
    <div class="lb-line">
      <span class="rank">${rank}</span>
      <span class="who">${who}</span>
      <span class="val">${tiles.toLocaleString("fr-FR")} · ${pct} %</span>
    </div>
    <div class="lb-bar"><div style="width:${pct}%"></div></div>
  </div>`;
}

async function refreshRanking() {
  if (lbMode === "clans") {
    const rows = (await api("/api/leaderboard/clans")) || [];
    $("lb-rows").innerHTML = rows.length
      ? rows.map((c, i) =>
          lbRow(i + 1, `${c.name} (${c.members})`, c.tiles, rows[0].tiles, false)
        ).join("")
      : '<div class="lb-sep">Aucun clan pour l\'instant</div>';
  } else {
    const lb = await api("/api/leaderboard");
    if (!lb) return;
    const leader = lb.top[0]?.tiles || 0;
    let html = lb.top.map((p, i) =>
      lbRow(i + 1, `${p.firstname} ${p.lastname ?? ""}`.trim(), p.tiles, leader,
        lb.me && Number(p.id) === Number(lb.me.id))
    ).join("");
    if (lb.me && lb.me.rank > lb.top.length) {
      html += `<div class="lb-sep">…</div>` +
        lbRow(lb.me.rank, `${lb.me.firstname} ${lb.me.lastname ?? ""}`.trim(), lb.me.tiles, leader, true);
    }
    $("lb-rows").innerHTML = html;
  }
  $("ranking").style.display = "block";
}

$("lb-players").onclick = () => { lbMode = "players"; $("lb-players").classList.add("on"); $("lb-clans").classList.remove("on"); refreshRanking(); };
$("lb-clans").onclick = () => { lbMode = "clans"; $("lb-clans").classList.add("on"); $("lb-players").classList.remove("on"); refreshRanking(); };

async function refreshClan() {
  const clan = await api("/api/clans/me");
  $("clan").style.display = "block";
  if (!clan) {
    $("clan-title").textContent = "Pas encore de clan";
    $("clan-forms").style.display = "block";
    $("board").innerHTML = "";
    document.querySelector("#clan .tabs").style.display = "none";
    return;
  }
  $("clan-forms").style.display = "none";
  document.querySelector("#clan .tabs").style.display = "flex";
  $("clan-title").innerHTML =
    `Clan · ${clan.name} <span class="code">code : ${clan.invite_code}</span>`;
  const rows = clan.members
    .map((m) => ({
      name: `${m.firstname} ${m.lastname ?? ""}`.trim(),
      km: Math.round(m.km_m / 1000),
      tiles: m.tiles,
    }))
    .sort((a, b) => (metric === "km" ? b.km - a.km : b.tiles - a.tiles));
  $("board").innerHTML = rows
    .map(
      (m, i) => `
      <div class="member">
        <span class="rank">${i + 1}</span>
        <span class="who">${m.name}</span>
        <span class="val">${
          metric === "km"
            ? m.km.toLocaleString("fr-FR") + " km"
            : m.tiles.toLocaleString("fr-FR") + " cases"
        }</span>
      </div>`
    )
    .join("");
}

$("period-all").onclick = () => {
  periodSince = null;
  $("period-all").classList.add("on");
  $("period-year").classList.remove("on");
  refreshMap();
  refreshStats();
};
$("period-year").onclick = () => {
  periodSince = `${new Date().getFullYear()}-01-01`;
  $("period-year").classList.add("on");
  $("period-all").classList.remove("on");
  refreshMap();
  refreshStats();
};

$("tab-km").onclick = () => { metric = "km"; $("tab-km").classList.add("on"); $("tab-tiles").classList.remove("on"); refreshClan(); };
$("tab-tiles").onclick = () => { metric = "tiles"; $("tab-tiles").classList.add("on"); $("tab-km").classList.remove("on"); refreshClan(); };

$("create-clan").onclick = async () => {
  const name = $("clan-name").value.trim();
  if (!name) return;
  await api("/api/clans", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  refreshClan();
};
$("join-clan").onclick = async () => {
  const code = $("clan-code").value.trim();
  if (!code) return;
  const r = await api("/api/clans/join", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code }),
  });
  if (!r) alert("Code inconnu");
  refreshClan();
};

let pollTimer = null;
async function poll() {
  const me = await api("/api/me");
  if (!me) return;
  const syncing = me.sync_status === "syncing" || me.sync_status === "queued";
  $("progress").style.display = syncing ? "block" : "none";
  if (syncing && me.sync_total > 0) {
    $("fill").style.width = `${Math.round((100 * me.sync_done) / me.sync_total)}%`;
    $("progress-label").textContent =
      `Synchronisation : ${me.sync_done} / ${me.sync_total} activités`;
  } else if (syncing) {
    $("progress-label").textContent = "Récupération de la liste des activités…";
  }
  await Promise.all([refreshStats(), refreshMap(), refreshSports(), refreshRanking()]);
  if (syncing) pollTimer = setTimeout(poll, 8000);
}

async function boot() {
  const me = await api("/api/me");
  if (!me) {
    $("connect").style.display = "block";
    return;
  }
  $("connect").style.display = "none";
  $("logout").style.display = "block";
  $("period-tabs").style.display = "flex";
  $("period-year").textContent = String(new Date().getFullYear());
  $("share").style.display = "block";
  $("countries-btn").style.display = "block";
  refreshRanking();
  $("name").textContent = `${me.firstname} ${me.lastname ?? ""}`;
  $("subtitle").textContent = "Ta carte de conquête";
  if (me.profile && me.profile.startsWith("http")) $("avatar").src = me.profile;
  refreshClan();
  poll();
}

// --- Menu "Mes pays" : score par pays + zone principale ---
function fmtPct(p) {
  if (p >= 1) return `${(Math.round(p * 10) / 10).toLocaleString("fr-FR")} %`;
  if (p >= 0.01) return `${(Math.round(p * 100) / 100).toLocaleString("fr-FR")} %`;
  return "< 0,01 %";
}

async function openCountries() {
  $("countries-modal").style.display = "block";
  $("countries-rows").innerHTML = '<div class="lb-sep">Calcul en cours…</div>';

  // Zone principale : cluster le plus dense + nom via Nominatim
  if (tilesData.features.length) {
    const b = denseBounds(tilesData.features);
    const c = b.getCenter();
    $("main-zone").style.display = "flex";
    $("main-zone-label").textContent = "Zone principale : …";
    $("main-zone-go").onclick = () => {
      $("countries-modal").style.display = "none";
      map.fitBounds(b, { padding: 70, maxZoom: 12 });
    };
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${c.lat}&lon=${c.lng}&format=json&zoom=10&accept-language=fr`)
      .then((r) => r.json())
      .then((j) => {
        const a = j.address || {};
        const place = a.city || a.town || a.village || a.municipality || a.county || "";
        $("main-zone-label").textContent =
          `Zone principale : ${[place, a.country].filter(Boolean).join(", ") || "—"}`;
      })
      .catch(() => ($("main-zone-label").textContent = "Zone principale"));
  }

  const rows = (await api("/api/countries")) || [];
  $("countries-rows").innerHTML = rows.length
    ? rows.map((c, i) => `
      <div class="country-row" data-i="${i}" title="Voir mes cases : ${c.name}">
        <div class="country-line">
          <span>${c.flag || "🏳️"}</span>
          <span class="who">${c.name}</span>
          <span class="val">${Math.round(c.km).toLocaleString("fr-FR")} km · ${c.tiles.toLocaleString("fr-FR")} cases · ${fmtPct(c.pct)}</span>
          <span class="go">Y aller ›</span>
        </div>
        <div class="country-bar"><div style="width:${Math.max(0.5, Math.min(100, c.pct))}%"></div></div>
      </div>`).join("")
    : '<div class="lb-sep">Aucune case pour l\'instant</div>';
  for (const el of document.querySelectorAll(".country-row")) {
    el.onclick = () => {
      const c = rows[Number(el.dataset.i)];
      if (!c?.bounds) return;
      $("countries-modal").style.display = "none";
      map.fitBounds(
        [[c.bounds[0], c.bounds[1]], [c.bounds[2], c.bounds[3]]],
        { padding: 80, maxZoom: 12 }
      );
    };
  }
}
$("countries-btn").onclick = openCountries;
$("countries-close").onclick = () => ($("countries-modal").style.display = "none");
$("countries-modal").onclick = (e) => {
  if (e.target === $("countries-modal")) $("countries-modal").style.display = "none";
};

// --- Image de partage : carte + stats + rang, format story 4:5 ---
async function shareCard() {
  if (!lastStats) return;
  const s = lastStats;
  const src = map.getCanvas();
  const W = 1080, H = 1350;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");

  const scale = Math.max(W / src.width, H / src.height);
  ctx.drawImage(src, (W - src.width * scale) / 2, (H - src.height * scale) / 2,
    src.width * scale, src.height * scale);

  const g = ctx.createLinearGradient(0, H * 0.5, 0, H);
  g.addColorStop(0, "rgba(16,32,28,0)");
  g.addColorStop(1, "rgba(16,32,28,0.94)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  const name = $("name").textContent.trim();
  const tier = s.tier || TIERS[0];
  ctx.fillStyle = "#fff";
  ctx.font = "700 58px ui-sans-serif, system-ui";
  ctx.fillText(name, 60, H - 260);

  // badge de rang
  ctx.font = "600 34px ui-sans-serif, system-ui";
  const label = tier[1].toUpperCase();
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = tier[2];
  ctx.beginPath();
  ctx.roundRect(60, H - 232, tw + 48, 56, 28);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillText(label, 84, H - 193);

  ctx.font = "400 36px ui-sans-serif, system-ui";
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  const km2 = Math.round(s.area_km2 || 0);
  const eq = equivalence(km2);
  ctx.fillText(
    `${s.tiles.toLocaleString("fr-FR")} cases · ${km2.toLocaleString("fr-FR")} km²${eq ? " · " + eq : ""}`,
    60, H - 110
  );
  ctx.font = "700 30px ui-sans-serif, system-ui";
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.letterSpacing = "6px";
  ctx.fillText("TERRITOIRES", 60, H - 52);
  ctx.letterSpacing = "0px";

  c.toBlob(async (blob) => {
    const file = new File([blob], "territoires.png", { type: "image/png" });
    if (navigator.canShare?.({ files: [file] })) {
      try { await navigator.share({ files: [file], title: "Mes territoires" }); return; } catch {}
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "territoires.png";
    a.click();
    URL.revokeObjectURL(a.href);
  }, "image/png");
}
$("share").onclick = shareCard;

boot();

$("connect").onclick = () => (location.href = "/auth/strava");
$("logout").onclick = async () => {
  await api("/auth/logout", { method: "POST" });
  location.reload();
};
</script>
